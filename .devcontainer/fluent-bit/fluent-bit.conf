[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          modify
    Match         docker.*
    Add           service ${DD_SERVICE}
    Add           env ${DD_ENV}
    Add           source java
    Add           runtime devcontainer

[OUTPUT]
    Name            datadog
    Match           docker.*
    Host            http-intake.logs.${DD_SITE}
    TLS             On
    apikey          ${DD_API_KEY}
    compress        gzip
    dd_service      ${DD_SERVICE}
    dd_source       java
    dd_tags         env:${DD_ENV},source:stdout,runtime:devcontainer
    dd_message_key  log
    Retry_Limit     False
